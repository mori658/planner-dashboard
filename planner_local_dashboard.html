<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planner Performance Dashboard</title>
<script src="chart.min.js"></script>
<script src="msal-browser.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px}
  #login-screen h1{font-size:28px;font-weight:700}
  #login-screen p{color:#94a3b8;text-align:center;max-width:420px;line-height:1.6}
  .config-box{background:#1e293b;border-radius:12px;padding:24px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px}
  .config-box label{font-size:13px;color:#94a3b8;margin-bottom:2px}
  .config-box input{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;width:100%}
  .config-box input:focus{outline:none;border-color:#6366f1}
  .btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:background .2s}
  .btn:hover{background:#4f46e5}
  .btn:disabled{background:#374151;cursor:not-allowed}
  .btn-sm{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer}
  .btn-sm:hover{background:#334155;color:#e2e8f0}
  .error-box{background:#450a0a;border:1px solid #991b1b;border-radius:10px;padding:14px 18px;font-size:13px;color:#fca5a5;max-width:440px;width:100%;line-height:1.6}
  #app{display:none;padding:24px;max-width:1200px;margin:0 auto}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .header h1{font-size:20px;font-weight:700}
  .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
  .plan-card{background:#1e293b;border:2px solid #334155;border-radius:12px;padding:20px;cursor:pointer;transition:border-color .2s,background .2s;text-align:left;color:#e2e8f0}
  .plan-card:hover{border-color:#6366f1;background:#1e2d47}
  .plan-card.active{border-color:#6366f1}
  .plan-card .emoji{font-size:28px;margin-bottom:8px}
  .plan-card .name{font-weight:600;font-size:14px}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .kpi{background:#1e293b;border-radius:12px;padding:18px 22px;flex:1;min-width:130px}
  .kpi .label{color:#94a3b8;font-size:12px;margin-bottom:6px}
  .kpi .value{font-size:30px;font-weight:700}
  .kpi .sub{color:#64748b;font-size:11px;margin-top:4px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{background:#1e293b;border:none;color:#94a3b8;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;transition:all .15s}
  .tab.active{background:#6366f1;color:#fff;font-weight:600}
  .panel{display:none}
  .panel.active{display:block}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.charts-grid{grid-template-columns:1fr}}
  .card{background:#1e293b;border-radius:12px;padding:20px}
  .card h3{font-size:12px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
  canvas{max-height:220px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:#64748b;text-align:left;padding:8px 12px;border-bottom:1px solid #334155;font-weight:500;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #0f172a}
  .badge{border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block}
  .badge-green{background:#064e3b;color:#10b981}
  .badge-blue{background:#1e3a5f;color:#6366f1}
  .badge-red{background:#450a0a;color:#f87171}
  .bar-wrap{background:#0f172a;border-radius:99px;height:8px;margin-top:4px}
  .bar-fill{height:8px;border-radius:99px;transition:width .5s}
  .late-item{background:#0f172a;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .late-title{font-weight:600;font-size:14px}
  .late-meta{color:#64748b;font-size:12px;margin-top:2px}
  #dash-loading{text-align:center;padding:60px;color:#94a3b8;font-size:15px}
  .spinner{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div style="font-size:52px">📊</div>
  <h1>Planner Performance Dashboard</h1>
  <p>Inserisci le credenziali della tua app Azure per connetterti ai tuoi piani Planner.</p>

  <div class="config-box">
    <label>Azure App Client ID</label>
    <input type="text" id="clientId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
    <label>Tenant ID <span style="color:#475569">(lascia "common" se non sei sicuro)</span></label>
    <input type="text" id="tenantId" value="common"/>
    <button class="btn" id="loginBtn" onclick="startLogin()">🔗 Accedi con Microsoft</button>
  </div>
  <div id="login-error" style="display:none"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <h1 id="app-title">📊 Planner Dashboard</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="user-label" style="color:#64748b;font-size:13px"></span>
      <button class="btn-sm" onclick="logout()">Esci</button>
    </div>
  </div>
  <div id="main-content"></div>
</div>

<script>
// ── GLOBALS ───────────────────────────────────────────────────
let msalInstance = null;
const EMOJIS = ['📌','🗂️','📁','🚀','🎯','⚙️','🔧','📐','🌐','💡'];
const COLORS = ['#6366f1','#22d3ee','#f59e0b','#10b981','#f43f5e','#a78bfa','#fb923c'];

// ── AUTH ──────────────────────────────────────────────────────
async function startLogin() {
  const clientId = document.getElementById('clientId').value.trim();
  const tenantId = document.getElementById('tenantId').value.trim() || 'common';

  if (!clientId) { showError('Inserisci il Client ID prima di procedere.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Connessione...';
  hideError();

  try {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId,
        authority: `https://login.microsoftonline.com/${tenantId}`,
        // redirectUri per il popup deve essere la stessa pagina
        redirectUri: 'https://mori658.github.io/planner-dashboard/blank.html'
      },
      cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
      system: {
        loggerOptions: {
          logLevel: msal.LogLevel.Error,
          loggerCallback: (level, msg) => console.log('[MSAL]', msg)
        }
      }
    });

    await msalInstance.initialize();

    // Controlla se già loggato in sessione
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      localStorage.setItem('pdb_cid', clientId);
      localStorage.setItem('pdb_tid', tenantId);
      showApp(accounts[0]);
      return;
    }

    // Login popup
    const resp = await msalInstance.loginPopup({
      scopes: ['Tasks.Read', 'User.Read'],
      prompt: 'select_account'
    });

    localStorage.setItem('pdb_cid', clientId);
    localStorage.setItem('pdb_tid', tenantId);
    showApp(resp.account);

  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = '🔗 Accedi con Microsoft';
    if (e.errorCode === 'popup_window_error') {
      showError('Il browser ha bloccato il popup. Clicca sul lucchetto 🔒 nella barra dell\'indirizzo e consenti i popup per questa pagina, poi riprova.');
    } else if (e.errorCode === 'user_cancelled') {
      showError('Login annullato. Riprova quando vuoi.');
    } else {
      showError(`Errore: ${e.message || e.errorCode}`);
    }
  }
}

async function getToken() {
  const accs = msalInstance.getAllAccounts();
  if (!accs.length) throw new Error('Nessun account trovato. Effettua il login.');
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: ['Tasks.Read'], account: accs[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: ['Tasks.Read'] });
    return r.accessToken;
  }
}

function logout() {
  if (msalInstance) msalInstance.logoutPopup();
  localStorage.removeItem('pdb_cid');
  localStorage.removeItem('pdb_tid');
  location.reload();
}

// ── UI HELPERS ────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('login-error');
  el.className = 'error-box';
  el.innerHTML = '⚠️ ' + msg;
  el.style.display = 'block';
}
function hideError() { document.getElementById('login-error').style.display = 'none'; }

function showApp(account) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = account.name || account.username;
  loadPlans();
}

// ── GRAPH ─────────────────────────────────────────────────────
async function graph(path) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${r.status}`);
  }
  return r.json();
}

// ── PLANS ─────────────────────────────────────────────────────
async function loadPlans() {
  const c = document.getElementById('main-content');
  c.innerHTML = '<div id="dash-loading"><span class="spinner">⏳</span> Caricamento piani...</div>';
  try {
    const data = await graph('/me/planner/plans');
    const plans = data.value || [];
    if (!plans.length) { c.innerHTML = '<p style="color:#64748b;padding:20px">Nessun piano trovato nel tuo account.</p>'; return; }
    let html = '<div class="plans-grid">';
    plans.forEach((p, i) => {
      html += `<button class="plan-card" onclick="loadPlan('${p.id}','${escHtml(p.title)}',this)">
        <div class="emoji">${EMOJIS[i % EMOJIS.length]}</div>
        <div class="name">${escHtml(p.title)}</div>
      </button>`;
    });
    html += '</div><div id="dashboard"></div>';
    c.innerHTML = html;
  } catch (e) {
    c.innerHTML = `<div class="error-box">❌ Errore nel caricamento dei piani: ${e.message}<br><small>Verifica che il permesso Tasks.Read sia stato aggiunto nell'app Azure.</small></div>`;
  }
}

function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── LOAD PLAN ─────────────────────────────────────────────────
async function loadPlan(planId, planTitle, btn) {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('app-title').textContent = '📊 ' + planTitle;
  const dash = document.getElementById('dashboard');
  dash.innerHTML = '<div id="dash-loading"><span class="spinner">⏳</span> Caricamento task...</div>';

  try {
    const [tasksRes, bucketsRes] = await Promise.all([
      graph(`/planner/plans/${planId}/tasks`),
      graph(`/planner/plans/${planId}/buckets`)
    ]);
    const tasks = tasksRes.value || [];
    const buckets = bucketsRes.value || [];
    const bucketMap = {};
    buckets.forEach(b => bucketMap[b.id] = b.name);
    tasks.forEach(t => t._bucket = bucketMap[t.bucketId] || '—');

    // Fetch user display names
    const uids = [...new Set(tasks.flatMap(t => Object.keys(t.assignments || {})))];
    const userMap = {};
    await Promise.allSettled(uids.map(async uid => {
      try { const u = await graph(`/users/${uid}`); userMap[uid] = u.displayName || uid; }
      catch { userMap[uid] = uid; }
    }));
    tasks.forEach(t => t._assignees = Object.keys(t.assignments || {}).map(id => userMap[id] || id));

    computeAndRender(tasks);
  } catch (e) {
    dash.innerHTML = `<div class="error-box">❌ Errore: ${e.message}</div>`;
  }
}

// ── METRICS ───────────────────────────────────────────────────
function daysBetween(d1, d2) { return Math.max(0, Math.round((new Date(d2) - new Date(d1)) / 864e5)); }
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }

function computeAndRender(tasks) {
  const now = new Date();
  const completed = tasks.filter(t => t.percentComplete === 100 && t.completedDateTime);
  const open = tasks.filter(t => t.percentComplete !== 100);
  const late = open.filter(t => t.dueDateTime && new Date(t.dueDateTime) < now);
  const avgClose = avg(completed.map(t => daysBetween(t.createdDateTime, t.completedDateTime)));

  // By person
  const pMap = {};
  tasks.forEach(t => {
    (t._assignees || []).forEach(p => {
      if (!pMap[p]) pMap[p] = { name: p, total: 0, done: 0, late: 0, days: [] };
      pMap[p].total++;
      if (t.percentComplete === 100 && t.completedDateTime) { pMap[p].done++; pMap[p].days.push(daysBetween(t.createdDateTime, t.completedDateTime)); }
      if (t.dueDateTime && new Date(t.dueDateTime) < now && t.percentComplete !== 100) pMap[p].late++;
    });
  });
  const byPerson = Object.values(pMap).map(p => ({ ...p, avgDays: avg(p.days), rate: p.total ? Math.round(p.done / p.total * 100) : 0 }));

  // Trend by month
  const wMap = {};
  completed.forEach(t => {
    const mon = new Date(t.completedDateTime).toISOString().slice(0, 7);
    wMap[mon] = (wMap[mon] || 0) + 1;
  });
  const trend = Object.entries(wMap).sort().slice(-8);

  // By bucket
  const bMap = {};
  tasks.forEach(t => {
    const b = t._bucket;
    if (!bMap[b]) bMap[b] = { name: b, total: 0, done: 0 };
    bMap[b].total++;
    if (t.percentComplete === 100) bMap[b].done++;
  });
  const byBucket = Object.values(bMap).map(b => ({ ...b, rate: b.total ? Math.round(b.done / b.total * 100) : 0 }));

  renderDashboard({ tasks, completed, open, late, avgClose, byPerson, trend, byBucket });
}

// ── RENDER ────────────────────────────────────────────────────
function renderDashboard(m) {
  const total = m.tasks.length || 1;
  const pct = n => Math.round(n / total * 100);

  document.getElementById('dashboard').innerHTML = `
    <div class="kpis">
      ${kpi('Task Totali', m.tasks.length, '', '#e2e8f0')}
      ${kpi('Completati', m.completed.length, pct(m.completed.length) + '% del totale', '#10b981')}
      ${kpi('Tempo Medio Chiusura', avgFmt(m.avgClose), 'dalla creazione al completamento', '#6366f1')}
      ${kpi('In Ritardo', m.late.length, 'aperti oltre la scadenza', m.late.length > 0 ? '#f43f5e' : '#10b981')}
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview',this)">📊 Overview</button>
      <button class="tab" onclick="switchTab('person',this)">👤 Per Persona</button>
      <button class="tab" onclick="switchTab('trend',this)">📈 Andamento</button>
      <button class="tab" onclick="switchTab('late',this)">⚠️ In Ritardo</button>
    </div>
    <div id="tab-overview" class="panel active">
      <div class="charts-grid">
        <div class="card"><h3>Completamento per Bucket</h3><canvas id="chart-bucket"></canvas></div>
        <div class="card"><h3>Distribuzione Stato</h3>
          ${sBar('Completati', m.completed.length, total, '#10b981')}
          ${sBar('Aperti', m.open.length - m.late.length, total, '#6366f1')}
          ${sBar('In Ritardo', m.late.length, total, '#f43f5e')}
        </div>
      </div>
    </div>
    <div id="tab-person" class="panel">
      <div class="card"><h3>Performance per Persona</h3>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Persona</th><th>Totale</th><th>Completati</th><th>% Completamento</th><th>Tempo Medio</th><th>In Ritardo</th></tr></thead>
          <tbody>${m.byPerson.map(p => `<tr>
            <td style="font-weight:600">${escHtml(p.name)}</td>
            <td style="color:#94a3b8">${p.total}</td>
            <td style="color:#10b981">${p.done}</td>
            <td><span class="badge ${p.rate>=75?'badge-green':p.rate>=50?'badge-blue':'badge-red'}">${p.rate}%</span></td>
            <td style="color:#f59e0b">${avgFmt(p.avgDays)}</td>
            <td style="color:${p.late>0?'#f87171':'#10b981'}">${p.late}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>
    <div id="tab-trend" class="panel">
      <div class="card"><h3>Task Chiusi nel Tempo (ultimi 8 mesi)</h3><canvas id="chart-trend" style="max-height:280px"></canvas></div>
    </div>
    <div id="tab-late" class="panel">
      <div class="card"><h3>Task in Ritardo (${m.late.length})</h3>
        ${m.late.length === 0
          ? '<div style="text-align:center;padding:40px;color:#10b981;font-size:28px">✅ Nessun task in ritardo!</div>'
          : m.late.map(t => {
              const d = Math.round((new Date() - new Date(t.dueDateTime)) / 864e5);
              return `<div class="late-item">
                <div>
                  <div class="late-title">${escHtml(t.title)}</div>
                  <div class="late-meta">${escHtml((t._assignees||[]).join(', ')||'Non assegnato')} · ${escHtml(t._bucket)}</div>
                </div>
                <span class="badge badge-red">+${d} gg</span>
              </div>`;
            }).join('')}
      </div>
    </div>`;

  // Draw charts after DOM is ready
  setTimeout(() => {
    new Chart(document.getElementById('chart-bucket'), {
      type: 'bar',
      data: { labels: m.byBucket.map(b => b.name), datasets: [{ data: m.byBucket.map(b => b.rate), backgroundColor: m.byBucket.map((_, i) => COLORS[i % COLORS.length]), borderRadius: 5 }] },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { max: 100, ticks: { callback: v => v + '%', color: '#64748b' }, grid: { color: '#334155' } }, y: { ticks: { color: '#94a3b8' } } }, maintainAspectRatio: false }
    });
    new Chart(document.getElementById('chart-trend'), {
      type: 'line',
      data: { labels: m.trend.map(t => t[0]), datasets: [{ data: m.trend.map(t => t[1]), borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.15)', borderWidth: 2, pointBackgroundColor: '#6366f1', fill: true, tension: .4 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#334155' } }, y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } } }, maintainAspectRatio: false }
    });
  }, 50);
}

function kpi(label, value, sub, color) {
  return `<div class="kpi"><div class="label">${label}</div><div class="value" style="color:${color}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}
function sBar(label, val, total, color) {
  return `<div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px"><span style="color:#94a3b8">${label}</span><span style="color:${color}">${val}</span></div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(val/total*100)}%;background:${color}"></div></div>
  </div>`;
}
function avgFmt(n) { return n > 0 ? n.toFixed(1) + ' gg' : '—'; }
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── AUTO-LOGIN se credenziali salvate ─────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const cId = localStorage.getItem('pdb_cid');
  const tId = localStorage.getItem('pdb_tid') || 'common';
  if (cId) {
    document.getElementById('clientId').value = cId;
    document.getElementById('tenantId').value = tId;
  }
});
</script>
</body>
</html>
