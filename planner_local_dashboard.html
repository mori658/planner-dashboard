<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planner Performance Dashboard</title>
<script src="chart.min.js"></script>
<script src="msal-browser.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px}
  h1{font-size:26px;font-weight:700}
  p{color:#94a3b8;text-align:center;max-width:420px;line-height:1.6}
  .box{background:#1e293b;border-radius:12px;padding:24px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px}
  label{font-size:13px;color:#94a3b8}
  input{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;width:100%}
  input:focus{outline:none;border-color:#6366f1}
  .btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
  .btn:hover{background:#4f46e5}
  .btn:disabled{background:#374151;cursor:not-allowed}
  .btn-sm{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
  .btn-sm:hover{background:#334155;color:#e2e8f0}
  .err{background:#450a0a;border:1px solid #991b1b;border-radius:10px;padding:14px 18px;font-size:13px;color:#fca5a5;width:100%;max-width:440px;line-height:1.6}
  #app{display:none;padding:20px;max-width:1300px;margin:0 auto}
  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px}
  .plan-card{background:#1e293b;border:2px solid #334155;border-radius:10px;padding:16px;cursor:pointer;text-align:left;color:#e2e8f0;transition:border-color .15s}
  .plan-card:hover,.plan-card.active{border-color:#6366f1}
  .plan-card .em{font-size:24px;margin-bottom:6px}
  .plan-card .nm{font-weight:600;font-size:13px}
  /* Filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filters label{font-size:12px;color:#64748b;margin-right:2px}
  .filters input[type=date]{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 10px;color:#e2e8f0;font-size:12px;width:auto}
  .filters select{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 10px;color:#e2e8f0;font-size:12px}
  .filters .btn-sm{padding:6px 12px;font-size:12px}
  /* KPIs */
  .kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .kpi{background:#1e293b;border-radius:10px;padding:16px 20px;flex:1;min-width:120px}
  .kpi .lbl{color:#94a3b8;font-size:11px;margin-bottom:4px}
  .kpi .val{font-size:28px;font-weight:700}
  .kpi .sub{color:#64748b;font-size:11px;margin-top:3px}
  /* Tabs */
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{background:#1e293b;border:none;color:#94a3b8;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
  .tab.active{background:#6366f1;color:#fff;font-weight:600}
  .panel{display:none}
  .panel.active{display:block}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.grid2{grid-template-columns:1fr}}
  .card{background:#1e293b;border-radius:10px;padding:18px}
  .card h3{font-size:11px;color:#94a3b8;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
  canvas{max-height:230px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:#64748b;text-align:left;padding:8px 10px;border-bottom:1px solid #334155;font-weight:500;white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid #0f172a}
  .badge{border-radius:99px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block}
  .g{background:#064e3b;color:#10b981}
  .b{background:#1e3a5f;color:#6366f1}
  .r{background:#450a0a;color:#f87171}
  .bar-w{background:#0f172a;border-radius:99px;height:7px;margin-top:3px}
  .bar-f{height:7px;border-radius:99px}
  .li{background:#0f172a;border-radius:8px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .li .tt{font-weight:600;font-size:13px}
  .li .mt{color:#64748b;font-size:12px;margin-top:2px}
  #dash-load{text-align:center;padding:50px;color:#94a3b8}
  .spin{display:inline-block;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .prog-wrap{background:#1e293b;border-radius:10px;padding:20px;margin-bottom:16px}
  .prog-bar{background:#334155;border-radius:99px;height:6px;margin-top:8px}
  .prog-fill{height:6px;border-radius:99px;background:#6366f1;transition:width .3s}
  .prog-lbl{color:#64748b;font-size:12px}
</style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:48px">📊</div>
  <h1>Planner Performance Dashboard</h1>
  <p>Connettiti a Microsoft 365 per analizzare i tuoi piani Planner.</p>
  <div class="box">
    <label>Azure App Client ID</label>
    <input id="clientId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
    <label>Tenant ID</label>
    <input id="tenantId" value="common"/>
    <button class="btn" id="loginBtn" onclick="startLogin()">🔗 Accedi con Microsoft</button>
  </div>
  <div id="lerr" style="display:none"></div>
</div>

<div id="app">
  <div class="hdr">
    <h1 id="app-title">📊 Planner Dashboard</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="ulab" style="color:#64748b;font-size:13px"></span>
      <button class="btn-sm" onclick="logout()">Esci</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<script>
const EMOJIS=['📌','🗂️','📁','🚀','🎯','⚙️','🔧','📐','🌐','💡'];
const COLS=['#6366f1','#22d3ee','#f59e0b','#10b981','#f43f5e','#a78bfa','#fb923c'];
let msalInstance=null, allTasks=[], userCache={};

// ── AUTH ──────────────────────────────────────────────────────
async function startLogin(){
  const cid=document.getElementById('clientId').value.trim();
  const tid=document.getElementById('tenantId').value.trim()||'common';
  if(!cid){showErr('Inserisci il Client ID.');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='⏳ Connessione...'; hideErr();
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{clientId:cid,authority:`https://login.microsoftonline.com/${tid}`,
        redirectUri:'https://mori658.github.io/planner-dashboard/blank.html'},
      cache:{cacheLocation:'sessionStorage'},
      system:{loggerOptions:{logLevel:msal.LogLevel.Error,loggerCallback:(l,m)=>console.log(m)}}
    });
    await msalInstance.initialize();
    const accs=msalInstance.getAllAccounts();
    if(accs.length){localStorage.setItem('pdb_c',cid);localStorage.setItem('pdb_t',tid);showApp(accs[0]);return;}
    const r=await msalInstance.loginPopup({scopes:['Tasks.Read','User.Read'],prompt:'select_account'});
    localStorage.setItem('pdb_c',cid);localStorage.setItem('pdb_t',tid);
    showApp(r.account);
  }catch(e){
    btn.disabled=false;btn.textContent='🔗 Accedi con Microsoft';
    showErr(e.errorCode==='popup_window_error'?'Popup bloccato dal browser. Consenti i popup e riprova.':e.message||e.errorCode);
  }
}
async function getToken(){
  const a=msalInstance.getAllAccounts();
  try{return (await msalInstance.acquireTokenSilent({scopes:['Tasks.Read','User.Read'],account:a[0]})).accessToken;}
  catch{return (await msalInstance.acquireTokenPopup({scopes:['Tasks.Read','User.Read']})).accessToken;}
}
function logout(){if(msalInstance)msalInstance.logoutPopup();localStorage.removeItem('pdb_c');localStorage.removeItem('pdb_t');location.reload();}
function showErr(m){const e=document.getElementById('lerr');e.className='err';e.innerHTML='⚠️ '+m;e.style.display='block';}
function hideErr(){document.getElementById('lerr').style.display='none';}

// ── GRAPH ─────────────────────────────────────────────────────
async function graph(path){
  const r=await fetch('https://graph.microsoft.com/v1.0'+path,{headers:{Authorization:'Bearer '+await getToken()}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+r.status);}
  return r.json();
}

// Fetch ALL pages (handles Planner pagination)
async function graphAll(path){
  let url='https://graph.microsoft.com/v1.0'+path, items=[];
  while(url){
    const r=await fetch(url,{headers:{Authorization:'Bearer '+await getToken()}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    items=[...items,...(d.value||[])];
    url=d['@odata.nextLink']||null;
  }
  return items;
}

// Get user display name - tries /users/{id} first, falls back to formatting the ID
async function getUserName(uid){
  if(userCache[uid]) return userCache[uid];
  try{
    // Try to get user profile - works for same-tenant users with Tasks.Read
    const u=await graph('/users/'+uid+'?$select=displayName,userPrincipalName,mail');
    const name=u.displayName||u.userPrincipalName?.split('@')[0]||u.mail?.split('@')[0]||uid;
    userCache[uid]=name;
  }catch{
    // If blocked by permissions, show a shortened version of the ID
    userCache[uid]='Utente-'+uid.slice(0,8);
  }
  return userCache[uid];
}

// ── APP INIT ──────────────────────────────────────────────────
async function showApp(account){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('ulab').textContent=account.name||account.username;
  await loadPlans();
}

async function loadPlans(){
  const m=document.getElementById('main');
  m.innerHTML='<div id="dash-load"><span class="spin">⏳</span> Caricamento piani...</div>';
  try{
    // Strategy: get all plans via /me/planner/plans (Tasks.Read is enough)
    // then enrich with plan IDs found in /me/planner/tasks for plans not yet listed
    const [myPlans, myTasks] = await Promise.all([
      graphAll('/me/planner/plans'),
      graphAll('/me/planner/tasks?$select=planId,title')
    ]);
    const planMap={};
    myPlans.forEach(p=>planMap[p.id]=p);
    // For any planId found in tasks but not in plans list, fetch it directly
    const missingIds=[...new Set(myTasks.map(t=>t.planId))].filter(id=>!planMap[id]);
    const extra=await Promise.allSettled(missingIds.map(id=>graph(`/planner/plans/${id}`)));
    extra.forEach(r=>{if(r.status==='fulfilled'&&r.value?.id) planMap[r.value.id]=r.value;});
    const plans=Object.values(planMap);
    if(!plans.length){m.innerHTML='<p style="color:#64748b;padding:20px">Nessun piano trovato.</p>';return;}
    let html='<div class="plans-grid">';
    plans.forEach((p,i)=>html+=`<button class="plan-card" onclick="selectPlan('${p.id}','${esc(p.title)}',this)"><div class="em">${EMOJIS[i%EMOJIS.length]}</div><div class="nm">${esc(p.title)}</div></button>`);
    html+='</div><div id="dashboard"></div>';
    m.innerHTML=html;
  }catch(e){m.innerHTML=`<div class="err">❌ ${e.message}</div>`;}
}

// ── LOAD PLAN ─────────────────────────────────────────────────
async function selectPlan(id,title,btn){
  document.querySelectorAll('.plan-card').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('app-title').textContent='📊 '+title;
  const dash=document.getElementById('dashboard');
  dash.innerHTML=`<div class="prog-wrap"><div class="prog-lbl" id="prog-lbl">⏳ Caricamento task...</div><div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div></div>`;

  try{
    setProgress('Caricamento task...', 10);
    const [tasksRaw, bucketsRaw]=await Promise.all([
      graphAll(`/planner/plans/${id}/tasks`),
      graphAll(`/planner/plans/${id}/buckets`)
    ]);
    setProgress(`Trovati ${tasksRaw.length} task. Caricamento dettagli...`, 30);

    const bucketMap={};
    bucketsRaw.forEach(b=>bucketMap[b.id]=b.name);

    // Fetch task details in batches of 10 (for completedDateTime and other details)
    const details=[];
    const batchSize=10;
    for(let i=0;i<tasksRaw.length;i+=batchSize){
      const batch=tasksRaw.slice(i,i+batchSize);
      const res=await Promise.allSettled(batch.map(t=>graph(`/planner/tasks/${t.id}/details`)));
      res.forEach((r,j)=>details[i+j]=r.status==='fulfilled'?r.value:{});
      setProgress(`Dettagli task: ${Math.min(i+batchSize,tasksRaw.length)}/${tasksRaw.length}`, 30+Math.round((i/tasksRaw.length)*40));
    }

    setProgress('Caricamento nomi utenti...', 72);
    // Collect all unique user IDs
    const uids=[...new Set(tasksRaw.flatMap(t=>Object.keys(t.assignments||{})))];
    await Promise.allSettled(uids.map(uid=>getUserName(uid)));

    setProgress('Elaborazione dati...', 90);

    // Enrich tasks
    allTasks=tasksRaw.map((t,i)=>({
      ...t,
      _bucket: bucketMap[t.bucketId]||'—',
      _assignees: Object.keys(t.assignments||{}).map(uid=>userCache[uid]||uid),
      _completedDateTime: details[i]?.completedDateTime || t.completedDateTime || null,
      _createdDateTime: t.createdDateTime
    }));

    setProgress('Pronto!', 100);
    setTimeout(()=>renderDashboard(allTasks), 300);
  }catch(e){
    dash.innerHTML=`<div class="err">❌ ${e.message}</div>`;
  }
}

function setProgress(lbl,pct){
  const l=document.getElementById('prog-lbl'), f=document.getElementById('prog-fill');
  if(l) l.textContent=lbl;
  if(f) f.style.width=pct+'%';
}

// ── FILTERS ───────────────────────────────────────────────────
function applyFilters(){
  const from=document.getElementById('f-from').value;
  const to=document.getElementById('f-to').value;
  const person=document.getElementById('f-person').value;
  const status=document.getElementById('f-status').value;

  let tasks=[...allTasks];
  if(from) tasks=tasks.filter(t=>t._createdDateTime&&t._createdDateTime>=from);
  if(to)   tasks=tasks.filter(t=>t._createdDateTime&&t._createdDateTime<=to+'T23:59:59Z');
  if(person&&person!=='all') tasks=tasks.filter(t=>(t._assignees||[]).includes(person));
  if(status==='open')  tasks=tasks.filter(t=>t.percentComplete!==100);
  if(status==='done')  tasks=tasks.filter(t=>t.percentComplete===100);
  if(status==='late'){
    const now=new Date();
    tasks=tasks.filter(t=>t.percentComplete!==100&&t.dueDateTime&&new Date(t.dueDateTime)<now);
  }
  renderDashboard(tasks, false);
}

function resetFilters(){
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  document.getElementById('f-person').value='all';
  document.getElementById('f-status').value='all';
  renderDashboard(allTasks, false);
}

// ── METRICS ───────────────────────────────────────────────────
function days(d1,d2){return Math.max(0,Math.round((new Date(d2)-new Date(d1))/864e5));}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function fmtD(n){return n>0?n.toFixed(1)+' gg':'—';}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function computeMetrics(tasks){
  const now=new Date();
  const completed=tasks.filter(t=>t.percentComplete===100&&t._completedDateTime);
  const open=tasks.filter(t=>t.percentComplete!==100);
  const late=open.filter(t=>t.dueDateTime&&new Date(t.dueDateTime)<now);

  const closureDays=completed.map(t=>days(t._createdDateTime,t._completedDateTime));
  const avgClose=avg(closureDays);

  // By person
  const pMap={};
  tasks.forEach(t=>{
    (t._assignees||[]).forEach(p=>{
      if(!pMap[p]) pMap[p]={name:p,total:0,done:0,late:0,days:[]};
      pMap[p].total++;
      if(t.percentComplete===100&&t._completedDateTime){pMap[p].done++;pMap[p].days.push(days(t._createdDateTime,t._completedDateTime));}
      if(t.dueDateTime&&new Date(t.dueDateTime)<now&&t.percentComplete!==100) pMap[p].late++;
    });
  });
  const byPerson=Object.values(pMap).map(p=>({...p,avgDays:avg(p.days),rate:p.total?Math.round(p.done/p.total*100):0}))
    .sort((a,b)=>b.total-a.total);

  // Trend by month
  const mMap={};
  completed.forEach(t=>{
    const mon=new Date(t._completedDateTime).toISOString().slice(0,7);
    mMap[mon]=(mMap[mon]||0)+1;
  });
  const trend=Object.entries(mMap).sort().slice(-12);

  // By bucket
  const bMap={};
  tasks.forEach(t=>{
    const b=t._bucket;
    if(!bMap[b]) bMap[b]={name:b,total:0,done:0};
    bMap[b].total++;
    if(t.percentComplete===100) bMap[b].done++;
  });
  const byBucket=Object.values(bMap).map(b=>({...b,rate:b.total?Math.round(b.done/b.total*100):0}))
    .sort((a,b)=>b.total-a.total);

  return{tasks,completed,open,late,avgClose,byPerson,trend,byBucket,lateTasks:late};
}

// ── RENDER ────────────────────────────────────────────────────
function renderDashboard(tasks, buildFilters=true){
  const m=computeMetrics(tasks);
  const total=m.tasks.length||1;

  // Build person list for filter dropdown
  const allPersons=[...new Set(allTasks.flatMap(t=>t._assignees||[]))].sort();

  const dash=document.getElementById('dashboard');

  // Filters
  const filterHtml=`
  <div class="filters">
    <div><label>Da:</label><br><input type="date" id="f-from" onchange="applyFilters()"></div>
    <div><label>A:</label><br><input type="date" id="f-to" onchange="applyFilters()"></div>
    <div><label>Persona:</label><br>
      <select id="f-person" onchange="applyFilters()">
        <option value="all">Tutti</option>
        ${allPersons.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}
      </select>
    </div>
    <div><label>Stato:</label><br>
      <select id="f-status" onchange="applyFilters()">
        <option value="all">Tutti</option>
        <option value="open">Aperti</option>
        <option value="done">Completati</option>
        <option value="late">In ritardo</option>
      </select>
    </div>
    <div style="align-self:flex-end"><button class="btn-sm" onclick="resetFilters()">✕ Reset</button></div>
    <div style="align-self:flex-end;color:#64748b;font-size:12px">${tasks.length} task visualizzati</div>
  </div>`;

  const kpisHtml=`
  <div class="kpis">
    ${kpi('Task Totali',m.tasks.length,'','#e2e8f0')}
    ${kpi('Completati',m.completed.length,Math.round(m.completed.length/total*100)+'% del totale','#10b981')}
    ${kpi('Tempo Medio Chiusura',fmtD(m.avgClose),'dalla creazione al completamento','#6366f1')}
    ${kpi('In Ritardo',m.late.length,'aperti oltre la scadenza',m.late.length>0?'#f43f5e':'#10b981')}
  </div>`;

  const tabsHtml=`
  <div class="tabs">
    <button class="tab active" onclick="sw('overview',this)">📊 Overview</button>
    <button class="tab" onclick="sw('person',this)">👤 Per Persona</button>
    <button class="tab" onclick="sw('trend',this)">📈 Andamento</button>
    <button class="tab" onclick="sw('late',this)">⚠️ In Ritardo (${m.late.length})</button>
  </div>`;

  const overviewHtml=`
  <div id="tab-overview" class="panel active">
    <div class="grid2">
      <div class="card"><h3>Completamento per Bucket</h3><canvas id="ch-bucket"></canvas></div>
      <div class="card"><h3>Distribuzione Stato</h3>
        ${sbar('Completati',m.completed.length,total,'#10b981')}
        ${sbar('Aperti',m.open.length-m.late.length,total,'#6366f1')}
        ${sbar('In Ritardo',m.late.length,total,'#f43f5e')}
      </div>
    </div>
  </div>`;

  const personHtml=`
  <div id="tab-person" class="panel">
    <div class="card"><h3>Performance per Persona</h3>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Persona</th><th>Totale</th><th>Completati</th><th>%</th><th>Tempo Medio</th><th>In Ritardo</th></tr></thead>
        <tbody>${m.byPerson.length?m.byPerson.map(p=>`<tr>
          <td style="font-weight:600">${esc(p.name)}</td>
          <td style="color:#94a3b8">${p.total}</td>
          <td style="color:#10b981">${p.done}</td>
          <td><span class="badge ${p.rate>=75?'g':p.rate>=50?'b':'r'}">${p.rate}%</span></td>
          <td style="color:#f59e0b">${fmtD(p.avgDays)}</td>
          <td style="color:${p.late>0?'#f87171':'#10b981'}">${p.late}</td>
        </tr>`).join(''):'<tr><td colspan="6" style="color:#64748b;text-align:center;padding:20px">Nessun task assegnato</td></tr>'}</tbody>
      </table></div>
    </div>
  </div>`;

  const trendHtml=`
  <div id="tab-trend" class="panel">
    <div class="card"><h3>Task Completati per Mese</h3>
      ${m.trend.length?`<canvas id="ch-trend" style="max-height:280px"></canvas>`:'<p style="color:#64748b;text-align:center;padding:30px">Nessun task completato nel periodo selezionato.<br><small>Nota: il dato richiede che i task abbiano una data di completamento registrata.</small></p>'}
    </div>
  </div>`;

  const lateHtml=`
  <div id="tab-late" class="panel">
    <div class="card"><h3>Task in Ritardo (${m.late.length})</h3>
      ${m.late.length===0
        ?'<div style="text-align:center;padding:36px;color:#10b981;font-size:26px">✅ Nessun task in ritardo!</div>'
        :m.late.map(t=>{
          const d=Math.round((new Date()-new Date(t.dueDateTime))/864e5);
          return `<div class="li"><div>
            <div class="tt">${esc(t.title)}</div>
            <div class="mt">${esc((t._assignees||[]).join(', ')||'Non assegnato')} · ${esc(t._bucket)}</div>
          </div><span class="badge r">+${d} gg</span></div>`;
        }).join('')}
    </div>
  </div>`;

  dash.innerHTML=filterHtml+kpisHtml+tabsHtml+overviewHtml+personHtml+trendHtml+lateHtml;

  // Restore filter values if not rebuilding
  if(!buildFilters){
    // values already in DOM from previous render, nothing to do
  }

  setTimeout(()=>{
    // Bucket chart
    const bc=document.getElementById('ch-bucket');
    if(bc) new Chart(bc,{type:'bar',
      data:{labels:m.byBucket.map(b=>b.name),datasets:[{data:m.byBucket.map(b=>b.rate),backgroundColor:m.byBucket.map((_,i)=>COLS[i%COLS.length]),borderRadius:5}]},
      options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{max:100,ticks:{callback:v=>v+'%',color:'#64748b'},grid:{color:'#334155'}},y:{ticks:{color:'#94a3b8'}}},maintainAspectRatio:false}
    });
    // Trend chart
    const tc=document.getElementById('ch-trend');
    if(tc&&m.trend.length) new Chart(tc,{type:'bar',
      data:{labels:m.trend.map(t=>t[0]),datasets:[
        {label:'Completati',data:m.trend.map(t=>t[1]),backgroundColor:'rgba(99,102,241,.7)',borderRadius:4}
      ]},
      options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b'},grid:{color:'#334155'}},y:{ticks:{color:'#64748b',stepSize:1},grid:{color:'#334155'}}},maintainAspectRatio:false}
    });
  },50);
}

function kpi(l,v,s,c){return `<div class="kpi"><div class="lbl">${l}</div><div class="val" style="color:${c}">${v}</div>${s?`<div class="sub">${s}</div>`:''}</div>`;}
function sbar(l,v,t,c){return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px"><span style="color:#94a3b8">${l}</span><span style="color:${c}">${v}</span></div><div class="bar-w"><div class="bar-f" style="width:${Math.round(v/t*100)}%;background:${c}"></div></div></div>`;}
function sw(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── AUTO LOGIN ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const c=localStorage.getItem('pdb_c'),t=localStorage.getItem('pdb_t')||'common';
  if(c){document.getElementById('clientId').value=c;document.getElementById('tenantId').value=t;}
});
</script>
</body>
</html>
